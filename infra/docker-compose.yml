# ═══════════════════════════════════════════════════════════════════════════
# Meta-Agent — Docker Compose for local development
# ═══════════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  # ── Meta-Agent API ──────────────────────────────────────────────
  meta-agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8080:8080"
    env_file: ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped
    networks:
      - meta-network

  # ── Redis (Short-Term Memory) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - meta-network

  # ── ChromaDB (Long-Term Memory) ──────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped
    networks:
      - meta-network

  # ── Prometheus (Metrics) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - meta-network

  # ── Grafana (Dashboards) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - meta-network

volumes:
  redis-data:
  chroma-data:
  prometheus-data:
  grafana-data:

networks:
  meta-network:
    driver: bridge
